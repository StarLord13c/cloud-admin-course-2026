services:
  localstack:
    image: localstack/localstack:4.0
    container_name: localstack-main
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - DEBUG=0
      - ENFORCE_IAM=1
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  localstack_data:
